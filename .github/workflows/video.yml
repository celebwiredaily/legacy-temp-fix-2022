name: Video Generation Pipeline

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Video title'
        required: true
        default: 'Test Video'
      script:
        description: 'Video script'
        required: true
      keywords:
        description: 'Keywords (comma-separated)'
        required: true
        default: 'automation,video,ai'
      voice:
        description: 'TTS voice'
        required: false
        default: 'en-US-BrianMultilingualNeural'
      duration:
        description: 'Duration in seconds'
        required: false
        default: '600'
      use_pinterest:
        description: 'Use Pinterest scraper instead of Pexels/Pixabay'
        required: false
        default: 'true'

  repository_dispatch:
    types: [trigger-video-gen]

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          ffmpeg -version

      # ── CACHE: Get VUZA's latest commit SHA for cache key ──────────────────
      - name: Get VUZA latest commit SHA
        id: vuza_sha
        run: |
          SHA=$(git ls-remote https://github.com/AliRash3ed/VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper HEAD | cut -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Cache VUZA repository
        id: cache-vuza
        uses: actions/cache@v4
        with:
          path: VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper
          key: vuza-repo-${{ steps.vuza_sha.outputs.sha }}

      - name: Clone VUZA repository
        if: steps.cache-vuza.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/AliRash3ed/VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper.git

      # ── CACHE: pip packages keyed on requirements.txt ──────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-vuza-${{ hashFiles('VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper/requirements.txt') }}
          restore-keys: |
            pip-vuza-

      - name: Install Python dependencies
        run: |
          cd VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests python-dotenv

      - name: Parse input data
        id: parse_input
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "title=${{ github.event.client_payload.title }}" >> $GITHUB_OUTPUT
            echo "script=${{ github.event.client_payload.script }}" >> $GITHUB_OUTPUT
            echo "keywords=${{ github.event.client_payload.keywords }}" >> $GITHUB_OUTPUT
            echo "voice=${{ github.event.client_payload.voice || 'en-US-BrianMultilingualNeural' }}" >> $GITHUB_OUTPUT
            echo "duration=${{ github.event.client_payload.duration || '600' }}" >> $GITHUB_OUTPUT
            echo "use_pinterest=${{ github.event.client_payload.use_pinterest || 'true' }}" >> $GITHUB_OUTPUT
          else
            echo 'title=${{ github.event.inputs.title }}' >> $GITHUB_OUTPUT
            echo 'script=${{ github.event.inputs.script }}' >> $GITHUB_OUTPUT
            echo 'keywords=${{ github.event.inputs.keywords }}' >> $GITHUB_OUTPUT
            echo 'voice=${{ github.event.inputs.voice }}' >> $GITHUB_OUTPUT
            echo 'duration=${{ github.event.inputs.duration }}' >> $GITHUB_OUTPUT
            echo 'use_pinterest=${{ github.event.inputs.use_pinterest }}' >> $GITHUB_OUTPUT
          fi

      - name: Create project directory structure
        run: |
          mkdir -p assets scripts output logs config
          PROJECT_ID="video_$(date +%Y%m%d_%H%M%S)_${{ github.run_id }}"
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: Generate VUZA configuration
        run: |
          IFS=',' read -ra KEYWORDS <<< "${{ steps.parse_input.outputs.keywords }}"
          KEYWORDS_JSON=$(printf '%s\n' "${KEYWORDS[@]}" | jq -R . | jq -s -c .)

          cat > config/${{ env.PROJECT_ID }}_config.json <<EOF
          {
            "project": {
              "title": "${{ steps.parse_input.outputs.title }}",
              "script": "${{ steps.parse_input.outputs.script }}",
              "duration": ${{ steps.parse_input.outputs.duration }}
            },
            "video": {
              "resolution": {"width": 1080, "height": 1920},
              "fps": 30,
              "quality": "high"
            },
            "audio": {
              "voice": "${{ steps.parse_input.outputs.voice }}",
              "rate": "normal",
              "background_music": true,
              "music_volume": 0.3
            },
            "content": {
              "use_pinterest": ${{ steps.parse_input.outputs.use_pinterest }},
              "pinterest_settings": {
                "search_keywords": ${KEYWORDS_JSON},
                "max_clips_per_keyword": 3,
                "quality": "hd",
                "download_path": "assets/pinterest"
              },
              "pexels_settings": {"enabled": false},
              "pixabay_settings": {"enabled": false},
              "keywords": ${KEYWORDS_JSON}
            },
            "output": {
              "path": "output/${{ env.PROJECT_ID }}.mp4",
              "format": "mp4"
            }
          }
          EOF

      # ── FIX: Start VUZA as a background server, call its API, then stop it ─
      - name: Start VUZA server in background
        run: |
          cd VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper
          python3 app.py &
          echo "VUZA_PID=$!" >> $GITHUB_ENV

          # Wait until the server is ready (up to 30s)
          echo "Waiting for VUZA server to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1 || \
               curl -s http://localhost:8000/docs   > /dev/null 2>&1 || \
               curl -s http://localhost:8000/       > /dev/null 2>&1; then
              echo "✅ VUZA server is up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Trigger video generation via VUZA API
        run: |
          CONFIG=$(cat config/${{ env.PROJECT_ID }}_config.json)

          # POST the job to VUZA — adjust the endpoint path to match VUZA's actual API
          RESPONSE=$(curl -s -X POST http://localhost:8000/generate \
            -H "Content-Type: application/json" \
            -d "$CONFIG")

          echo "VUZA response: $RESPONSE"

          # Extract job_id if VUZA returns one for async polling
          JOB_ID=$(echo "$RESPONSE" | jq -r '.job_id // .id // empty')
          if [ -n "$JOB_ID" ]; then
            echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV
          fi

      - name: Poll for video completion
        run: |
          MAX_WAIT=3000   # 50 minutes
          ELAPSED=0
          POLL_INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # If VUZA is synchronous, the output file is the signal
            if [ -f "output/${{ env.PROJECT_ID }}.mp4" ]; then
              echo "✅ Video file found after ${ELAPSED}s"
              break
            fi

            # If VUZA is async and returns a job_id, poll its status endpoint
            if [ -n "${JOB_ID:-}" ]; then
              STATUS=$(curl -s http://localhost:8000/status/$JOB_ID | jq -r '.status // empty')
              echo "Job status: $STATUS (${ELAPSED}s elapsed)"
              if [ "$STATUS" = "completed" ] || [ "$STATUS" = "done" ]; then
                echo "✅ Job completed"
                break
              elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
                echo "❌ Job failed"
                exit 1
              fi
            fi

            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ Timed out waiting for video"
            exit 1
          fi

      - name: Stop VUZA server
        if: always()
        run: |
          if [ -n "${VUZA_PID:-}" ]; then
            kill $VUZA_PID 2>/dev/null || true
            echo "VUZA server stopped"
          fi

      - name: Verify video generation
        run: |
          if [ -f "output/${{ env.PROJECT_ID }}.mp4" ]; then
            SIZE=$(du -sh output/${{ env.PROJECT_ID }}.mp4 | cut -f1)
            echo "✅ Success — file size: $SIZE"
          else
            echo "❌ Video file not found"
            exit 1
          fi

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_ID }}
          path: output/${{ env.PROJECT_ID }}.mp4
          retention-days: 7
