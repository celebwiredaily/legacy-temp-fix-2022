name: Video Generation Pipeline

on:
  # Trigger via webhook from ActivePieces
  repository_dispatch:
    types: [generate_video]
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      title:
        description: 'Video title'
        required: true
        default: 'Test Video'
      script:
        description: 'Video script'
        required: true
      keywords:
        description: 'Keywords (comma-separated)'
        required: true
        default: 'automation,video,ai'
      voice:
        description: 'TTS voice'
        required: false
        default: 'en-US-AriaNeural'
      duration:
        description: 'Duration in seconds'
        required: false
        default: '600'
      use_pinterest:
        description: 'Use Pinterest scraper instead of Pexels/Pixabay'
        required: false
        default: 'true'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
      
      - name: Clone VUZA repository
        run: |
          git clone https://github.com/AliRash3ed/VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper.git
          cd VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper
          ls -la
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper/requirements.txt
          pip install requests python-dotenv
      
      - name: Parse input data
        id: parse_input
        run: |
          # Handle both repository_dispatch and workflow_dispatch
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "title=${{ github.event.client_payload.title }}" >> $GITHUB_OUTPUT
            echo "script=${{ github.event.client_payload.script }}" >> $GITHUB_OUTPUT
            echo "keywords=${{ github.event.client_payload.keywords }}" >> $GITHUB_OUTPUT
            echo "voice=${{ github.event.client_payload.metadata.voice || 'en-US-AriaNeural' }}" >> $GITHUB_OUTPUT
            echo "duration=${{ github.event.client_payload.metadata.duration || '600' }}" >> $GITHUB_OUTPUT
            echo "use_pinterest=${{ github.event.client_payload.metadata.use_pinterest || 'true' }}" >> $GITHUB_OUTPUT
          else
            echo "title=${{ github.event.inputs.title }}" >> $GITHUB_OUTPUT
            echo "script=${{ github.event.inputs.script }}" >> $GITHUB_OUTPUT
            echo "keywords=${{ github.event.inputs.keywords }}" >> $GITHUB_OUTPUT
            echo "voice=${{ github.event.inputs.voice }}" >> $GITHUB_OUTPUT
            echo "duration=${{ github.event.inputs.duration }}" >> $GITHUB_OUTPUT
            echo "use_pinterest=${{ github.event.inputs.use_pinterest }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create project directory structure
        run: |
          mkdir -p assets scripts output logs config
          PROJECT_ID="video_$(date +%Y%m%d_%H%M%S)_${{ github.run_id }}"
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
      
      - name: Generate VUZA configuration
        run: |
          # Convert keywords to array format
          IFS=',' read -ra KEYWORDS <<< "${{ steps.parse_input.outputs.keywords }}"
          KEYWORDS_JSON=$(printf '%s\n' "${KEYWORDS[@]}" | jq -R . | jq -s .)
          
          # Create VUZA config with Pinterest scraper settings
          cat > config/${PROJECT_ID}_config.json << 'EOF'
          {
            "project": {
              "title": "${{ steps.parse_input.outputs.title }}",
              "script": "${{ steps.parse_input.outputs.script }}",
              "duration": ${{ steps.parse_input.outputs.duration }}
            },
            "video": {
              "resolution": {
                "width": 1920,
                "height": 1080
              },
              "fps": 30,
              "quality": "high"
            },
            "audio": {
              "voice": "${{ steps.parse_input.outputs.voice }}",
              "rate": "normal",
              "background_music": true,
              "music_volume": 0.3
            },
            "content": {
              "use_pinterest": ${{ steps.parse_input.outputs.use_pinterest }},
              "pinterest_settings": {
                "search_keywords": ${KEYWORDS_JSON},
                "max_clips_per_keyword": 3,
                "min_duration": 3,
                "max_duration": 8,
                "quality": "hd",
                "download_path": "assets/pinterest"
              },
              "pexels_settings": {
                "api_key": "${{ secrets.PEXELS_API_KEY }}",
                "enabled": false
              },
              "pixabay_settings": {
                "api_key": "${{ secrets.PIXABAY_API_KEY }}",
                "enabled": false
              },
              "keywords": ${KEYWORDS_JSON}
            },
            "output": {
              "path": "output/${PROJECT_ID}.mp4",
              "format": "mp4",
              "codec": "h264"
            }
          }
          EOF
          
          echo "Config generated at: config/${PROJECT_ID}_config.json"
          cat config/${PROJECT_ID}_config.json
      
      - name: Run VUZA video generation
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          cd VUZA-Free-AI-Video-Creator-and-Pinterest-Video-Scraper
          
          # Find VUZA entry point
          if [ -f "main.py" ]; then
            ENTRY_POINT="main.py"
          elif [ -f "vuza.py" ]; then
            ENTRY_POINT="vuza.py"
          elif [ -f "run.py" ]; then
            ENTRY_POINT="run.py"
          else
            echo "ERROR: Could not find VUZA entry point"
            ls -la
            exit 1
          fi
          
          echo "Using entry point: $ENTRY_POINT"
          
          # Run VUZA with config
          python $ENTRY_POINT --config ../config/${PROJECT_ID}_config.json \
            --output ../output/${PROJECT_ID}.mp4 \
            --pinterest-scraper \
            --verbose
      
      - name: Verify video generation
        run: |
          if [ -f "output/${PROJECT_ID}.mp4" ]; then
            echo "✅ Video generated successfully!"
            ls -lh output/${PROJECT_ID}.mp4
            
            # Get video info
            ffprobe -v quiet -print_format json -show_format -show_streams \
              output/${PROJECT_ID}.mp4 > output/${PROJECT_ID}_info.json
            
            # Display info
            cat output/${PROJECT_ID}_info.json | jq '.format.duration, .format.size'
          else
            echo "❌ Video generation failed!"
            ls -la output/
            exit 1
          fi
      
      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ env.PROJECT_ID }}
          path: |
            output/${{ env.PROJECT_ID }}.mp4
            output/${{ env.PROJECT_ID }}_info.json
          retention-days: 7
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ env.PROJECT_ID }}
          path: logs/
          retention-days: 3
      
      # Optional: Upload to external storage
      - name: Upload to cloud storage (optional)
        if: success() && vars.ENABLE_CLOUD_UPLOAD == 'true'
        run: |
          # Example for S3 (requires AWS credentials in secrets)
          # pip install awscli
          # aws s3 cp output/${PROJECT_ID}.mp4 s3://${{ secrets.S3_BUCKET }}/videos/
          
          # Example for Google Drive (requires setup)
          # Use rclone or gdrive CLI
          
          # Example for Dropbox
          # Use dropbox-sdk or dbxcli
          
          echo "Cloud upload would happen here"
