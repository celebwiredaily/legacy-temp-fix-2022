name: Refresh Pinterest Cookie

on:
  schedule:
    - cron: '0 6 */20 * *'   # every 20 days at 6am UTC
  workflow_dispatch:           # manual trigger if needed

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright requests -q
          playwright install chromium --with-deps

      - name: Login and extract cookie
        env:
          PINTEREST_EMAIL:    ${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD: ${{ secrets.PINTEREST_PASSWORD }}
          GH_TOKEN:           ${{ secrets.GH_PAT }}
          GH_REPO:            ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import asyncio, json, os, requests
          from playwright.async_api import async_playwright

          async def get_cookie():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                                 "AppleWebKit/537.36 (KHTML, like Gecko) "
                                 "Chrome/123.0.0.0 Safari/537.36"
                  )
                  page = await context.new_page()

                  print("Navigating to Pinterest login...")
                  await page.goto("https://www.pinterest.com/login/", wait_until="networkidle")
                  await page.wait_for_timeout(2000)

                  # Fill credentials
                  await page.fill('input[name="id"]', os.environ["PINTEREST_EMAIL"])
                  await page.fill('input[name="password"]', os.environ["PINTEREST_PASSWORD"])
                  await page.click('button[type="submit"]')

                  # Wait for redirect after login
                  await page.wait_for_url("**/pinterest.com/**", timeout=15000)
                  await page.wait_for_timeout(3000)

                  # Extract all cookies and format as header string
                  cookies = await context.cookies("https://www.pinterest.com")
                  cookie_str = "; ".join(f"{c['name']}={c['value']}" for c in cookies)

                  print(f"Extracted {len(cookies)} cookies")
                  await browser.close()
                  return cookie_str

          async def update_github_secret(secret_name: str, secret_value: str):
              """Update a GitHub Actions secret via the API."""
              token  = os.environ["GH_TOKEN"]
              repo   = os.environ["GH_REPO"]
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }

              # Get repo public key (needed to encrypt the secret)
              key_resp = requests.get(
                  f"https://api.github.com/repos/{repo}/actions/secrets/public-key",
                  headers=headers
              )
              key_data = key_resp.json()

              # Encrypt the secret value using libsodium (PyNaCl)
              from base64 import b64encode
              from nacl import encoding, public

              public_key = public.PublicKey(key_data["key"].encode(), encoding.Base64Encoder())
              sealed_box = public.SealedBox(public_key)
              encrypted  = b64encode(sealed_box.encrypt(secret_value.encode())).decode()

              # PUT the updated secret
              put_resp = requests.put(
                  f"https://api.github.com/repos/{repo}/actions/secrets/{secret_name}",
                  headers=headers,
                  json={"encrypted_value": encrypted, "key_id": key_data["key_id"]},
              )
              print(f"Secret update status: {put_resp.status_code}")
              return put_resp.status_code in (201, 204)

          async def main():
              # Install PyNaCl for encryption
              import subprocess, sys
              subprocess.check_call([sys.executable, "-m", "pip", "install", "PyNaCl", "-q"])

              cookie = await get_cookie()
              if not cookie or "_pinterest_sess" not in cookie:
                  raise RuntimeError("Login failed — cookie missing _pinterest_sess")

              print("Login successful. Updating GitHub secret...")
              ok = await update_github_secret("PINTEREST_COOKIE", cookie)
              if ok:
                  print("✅ PINTEREST_COOKIE secret updated successfully")
              else:
                  raise RuntimeError("Failed to update GitHub secret")

          asyncio.run(main())
          EOF
